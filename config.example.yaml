# MySQL 到 Oscar 迁移工具配置示例

# MySQL 源数据库配置
source:
  host: "192.168.1.200"
  port: 3306
  user: "root"
  password: "Ge"
  database: "a1"
  charset: "utf8mb4"

# Oscar 目标数据库配置
target:
  host: "192.168.2.2"
  port: 2003
  username: "test"
  password: "Ge"
  database: "osrdb"

# 迁移配置
migration:
  # 要迁移的表列表，为空表示迁移整个数据库
  tables:
  #    - file_tbl
  #    - scores
  # 是否迁移视图
  migrate_views: true
  # 是否迁移索引
  migrate_indexes: true
  # 并行处理数
  parallelism: 4
  # 数据批处理大小
  batch_size: 1000
  # 是否覆盖已存在的表
  overwrite: false
  # 大表优化配置
  large_table_optimization:
    # 是否启用大表优化
    enabled: true
    # 大表阈值（行数），超过此值启用分片并行
    row_threshold: 100000
    # 每个大表的并行分片数
    shard_parallelism: 4
    # 分片大小（每片的行数）
    shard_size: 50000