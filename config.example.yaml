# MySQL 到 Oscar 迁移工具配置示例

# MySQL 源数据库配置
source:
  host: "192.168.1.200"
  port: 3306
  user: "root"
  password: "Ge"
  database: "a1"
  charset: "utf8mb4"

# Oscar 目标数据库配置
target:
  host: "192.168.2.2"
  port: 2003
  username: "test"
  password: "Ge"
  database: "osrdb"

# 迁移配置
migration:
  # 要迁移的表列表，为空表示迁移整个数据库
  tables:
  #    - test_data
  #    - test_data2
  # 是否迁移视图
  migrate_views: true
  # 是否迁移索引
  migrate_indexes: true
  # 并行处理数
  parallelism: 8
  # 数据批处理大小
  batch_size: 200
  # 是否覆盖已存在的表
  overwrite: true
  # 新增：分片配置
  enable_chunking: true   # 是否启用分片（默认 true）
  chunk_size: 10000       # 每个分片的行数（默认 10000）
  chunk_parallelism: 8    # 单表内分片并行度（默认 2）
  chunk_threshold: 50000  # 启用分片的阈值行数（默认 50000）
  # 是否使用大写标识符（表名、列名、索引名、序列名、外键名等）
  # false: 使用小写（默认）
  # true: 使用大写
  use_uppercase: true